<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3s5vj</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 50px 40px;
            border-radius: 30px;
            text-align: center;
            width: 85%;
            max-width: 380px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .icons-header {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 35px;
        }

        .icons-header i {
            font-size: 50px;
            color: #fff; /* أيقونات بيضاء بسيطة ونظيفة */
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }

        .subtitle {
            color: #ccc;
            margin-bottom: 30px;
            font-size: 18px;
            display: block;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            color: #fff;
            padding: 18px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s ease; /* سرعة التوهج */
            border: none;
            position: relative;
        }

        /* لون الانستقرام الأصلي */
        .btn-insta {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        /* لون تيك توك الأصلي */
        .btn-tiktok {
            background: #000; /* أسود صريح */
            border: 1px solid #444;
        }

        /* --- تأثير التوهج والبياض عند الضغط أو المرور --- */
        .btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.3); /* يلمع الزر ويصبح أفتح */
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4); /* توهج أبيض حول الزر */
        }

        .btn:active {
            transform: scale(0.95); /* ينضغط الزر للداخل */
            filter: brightness(1.5); /* زيادة اللمعان لحظة الضغط */
        }

        .footer {
            font-size: 14px;
            color: #aaa;
            margin-top: 40px;
            display: block;
        }

        .highlight {
            color: #00f2fe; /* تمييز باللون السماوي */
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icons-header">
            <i class="fab fa-instagram"></i>
            <i class="fab fa-tiktok"></i>
        </div>
        
        <span class="subtitle">حساباتي الرسمية</span>

        <div class="links">
            <a href="https://instagram.com/3s5vj" class="btn btn-insta">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://tiktok.com/@3s5vj" class="btn btn-tiktok">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
        </div>

        <div class="footer">
             ✨ <span class="highlight">وصول مميز</span> ✨
             <br>
             اضغط على أي زر للمتابعة
        </div>
    </div>

</body>
</html>
