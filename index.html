<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3s5vj</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a0f0a; 
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden;
        }

        .container {
            background: rgba(43, 29, 23, 0.7);
            backdrop-filter: blur(20px);
            /* تم تصغير المساحة من الأسفل (الرقم 15px) لرفع المحتوى */
            padding: 40px 30px 15px 30px; 
            border-radius: 30px;
            text-align: center;
            width: 85%;
            max-width: 340px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .profile-area {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        .user-circle {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 3px solid #b76e79; 
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(183, 110, 121, 0.2);
        }

        .user-circle i {
            font-size: 45px;
            color: #b76e79;
        }

        /* اللمعان الذهبي الأصلي الذي يعجبك */
        .shine-text {
            display: inline-block;
            position: relative;
            font-weight: bold;
            /* اللون الذهبي الأصلي الثابت */
            color: #d4af37; 
            overflow: hidden;
            background: linear-gradient(to right, #d4af37 0%, #fff 50%, #d4af37 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: elegantShine 4s infinite ease-in-out;
        }

        .official-title {
            font-size: 20px;
            margin-bottom: 30px;
        }

        .gold-feature {
            font-size: 16px;
            margin-top: 10px;
        }

        @keyframes elegantShine {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-insta {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }
        .btn-insta:hover, .btn-insta:active {
            box-shadow: 0 0 25px rgba(220, 39, 67, 0.8); 
            filter: brightness(1.2);
        }

        .btn-tiktok {
            background: #000;
            border: 1px solid #333;
        }
        .btn-tiktok:hover, .btn-tiktok:active {
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.4);
            filter: brightness(1.2);
        }

        .footer {
            font-size: 13px;
            color: #8a7b75;
            margin-top: 35px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-area">
            <div class="user-circle">
                <i class="fas fa-user"></i>
            </div>
        </div>

        <div class="official-title">
            <span class="shine-text">✨ حساباتي الرسمية ✨</span>
        </div>

        <div class="links">
            <a href="https://www.instagram.com/3s5vj" class="btn btn-insta" target="_blank">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://www.tiktok.com/@3s5vj" class="btn btn-tiktok" target="_blank">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
        </div>

        <div class="footer">
             اضغط للمتابعة
             <div class="gold-feature">
                <span class="shine-text">✨ وصول مميز ✨</span>
             </div>
        </div>
    </div>

</body>
</html>
