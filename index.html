<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3s5vj</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e0e0e0;
        }

        .container {
            background: #141414;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            width: 85%;
            max-width: 380px;
            border: 1px solid #2a2a2a;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* حاوية الأيقونات الجديدة بدلاً من حرف H */
        .icons-header {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .icons-header i {
            font-size: 45px;
            color: #d4af37; /* لون ذهبي فخم للأيقونات */
            transition: 0.4s;
            filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.3));
        }

        .username {
            font-size: 38px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #fff;
        }

        .subtitle {
            color: #888;
            margin-bottom: 35px;
            font-size: 17px;
            display: block;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            color: #fff;
            padding: 16px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 18px;
            transition: 0.3s all ease-in-out;
            border: none;
            position: relative;
            overflow: hidden;
        }

        /* ألوان الأزرار الكاملة */
        .btn-insta {
            background: #b81d5b; /* عنابي فخم */
        }

        .btn-tiktok {
            background: #2a2a2a; /* أسود كربوني */
            border: 1px solid #444;
        }

        /* اقتراحي لتغيير لون/تأثير الضغط */
        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            filter: brightness(1.3);
        }

        .btn-insta:hover {
            box-shadow: 0 0 20px rgba(184, 29, 91, 0.4);
        }

        .btn-tiktok:hover {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            background: #333;
        }

        .footer {
            font-size: 14px;
            color: #666;
            margin-top: 35px;
            display: block;
        }

        .gold-text {
            color: #d4af37;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icons-header">
            <i class="fab fa-instagram"></i>
            <i class="fab fa-tiktok"></i>
        </div>

        <div class="username">𝓗 𖢱</div>
        
        <span class="subtitle">حساباتي الرسمية</span>

        <div class="links">
            <a href="https://instagram.com/3s5vj" class="btn btn-insta">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://tiktok.com/@3s5vj" class="btn btn-tiktok">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
        </div>

        <div class="footer">
             ✨ <span class="gold-text">وصول مميز</span> ✨
             <br>
             اضغط على أي زر للمتابعة
        </div>
    </div>

</body>
</html>
