<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3s5vj</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a0f0a; /* بني غامق فخم */
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: white;
            overflow: hidden;
        }

        .container {
            background: rgba(43, 29, 23, 0.8);
            backdrop-filter: blur(15px);
            padding: 45px 30px;
            border-radius: 25px;
            text-align: center;
            width: 85%;
            max-width: 340px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .profile-area {
            margin-bottom: 25px;
        }

        .user-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #b76e79; /* ذهبي وردي خفيف */
            display: inline-flex;
            justify-content: center;
            align-items: center;
            color: #b76e79;
            font-size: 35px;
            box-shadow: 0 0 15px rgba(183, 110, 121, 0.1);
        }

        /* حاوية نصوص اللمعان - لتطبيق التوهج */
        .shimmer-wrapper {
            display: inline-block;
            position: relative;
            overflow: hidden;
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textShimmer 4s infinite linear;
            font-weight: bold;
        }

        /* --- عنوان "حساباتي الرسمية" بلون فضي لامع ومستقل --- */
        .official-title {
            display: block;
            margin-bottom: 35px;
            font-size: 19px;
            /* تدرج فضي-أبيض-فضي ساطع */
            background-image: linear-gradient(to right, #a0a0a0 0%, #ffffff 50%, #a0a0a0 100%);
            /* توهج فضي ناعم */
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            color: white;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-insta {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }
        .btn-insta:hover {
            box-shadow: 0 0 20px rgba(220, 39, 67, 0.6);
            transform: translateY(-2px);
        }

        .btn-tiktok {
            background: #000;
            border: 1px solid #333;
        }
        .btn-tiktok:hover {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 40px;
            font-size: 13px;
            color: #8a7b75;
        }

        /* --- عنوان "وصول مميز" بلون ذهبي لامع ومستقل --- */
        .gold-feature {
            display: block;
            margin-top: 10px;
            font-size: 15px;
            /* تدرج ذهبي-أبيض-ذهبي ساطع */
            background-image: linear-gradient(to right, #d4af37 0%, #ffffff 50%, #d4af37 100%);
            /* توهج ذهبي ناعم */
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.5);
        }

        /* أنيميشن اللمعان المتحرك */
        @keyframes textShimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-area">
            <div class="user-circle">
                <i class="fas fa-user"></i>
            </div>
        </div>

        <span class="official-title shimmer-wrapper">✨ حساباتي الرسمية ✨</span>

        <div class="links">
            <a href="https://www.instagram.com/3s5vj" class="btn btn-insta" target="_blank">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://www.tiktok.com/@3s5vj" class="btn btn-tiktok" target="_blank">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
        </div>

        <div class="footer">
             اضغط للمتابعة
             <span class="gold-feature shimmer-wrapper">✨ وصول مميز ✨</span>
        </div>
    </div>

</body>
</html>
