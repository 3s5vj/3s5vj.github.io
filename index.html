<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3s5vj | Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            /* خلفية بني غامق ملكي */
            background: #1a0f0a; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .container {
            background: rgba(43, 29, 23, 0.6); /* درجة بني متناغمة مع الخلفية */
            backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 30px;
            text-align: center;
            width: 85%;
            max-width: 360px;
            border: 1px solid rgba(212, 175, 55, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        .icons-header {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 25px;
        }

        /* الأيقونات العلوية بألوانها الأصلية الهادئة */
        .fa-instagram {
            color: #e4405f; 
            font-size: 50px;
        }
        .fa-tiktok {
            color: #fff; /* أبيض ناصع للتيك توك ليبرز على البني */
            font-size: 50px;
            filter: drop-shadow(2px 2px #fe2c55) drop-shadow(-2px -2px #25f4ee);
        }

        /* كلمة "تواجد رسمي" مع أنيميشن اللمعان */
        .official-title {
            display: block;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 35px;
            background: linear-gradient(90deg, #d4af37, #fcf6ba, #d4af37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 200% auto;
            animation: shineGold 3s infinite linear;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            color: #fff;
            padding: 18px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .btn-insta { background: #b81d5b; }
        .btn-tiktok { background: #000; border: 1px solid #333; }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            filter: brightness(1.2);
        }

        .footer {
            font-size: 14px;
            color: #8a7b75;
            margin-top: 40px;
        }

        /* الذهب اللامع في الأسفل */
        .gold-shine {
            display: block;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
            background: linear-gradient(90deg, #bf953f, #fcf6ba, #bf953f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 200% auto;
            animation: shineGold 3s infinite linear;
        }

        @keyframes shineGold {
            to { background-position: 200% center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icons-header">
            <i class="fab fa-instagram"></i>
            <i class="fab fa-tiktok"></i>
        </div>
        
        <span class="official-title">Official Presence</span>

        <div class="links">
            <a href="https://www.instagram.com/3s5vj" class="btn btn-insta" target="_blank">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://www.tiktok.com/@3s5vj" class="btn btn-tiktok" target="_blank">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
        </div>

        <div class="footer">
             اضغط للمتابعة
             <span class="gold-shine">✨ وصول مميز ✨</span>
        </div>
    </div>

</body>
</html>
