<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3s5vj</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a0f0a; /* بني غامق ملكي */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .container {
            background: rgba(43, 29, 23, 0.7);
            backdrop-filter: blur(20px);
            padding: 35px 25px;
            border-radius: 25px;
            text-align: center;
            width: 80%;
            max-width: 320px; /* تصغير عرض الحاوية */
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        /* استبدال الأيقونات المزعجة بأيقونة بروفايل هادئة */
        .user-icon {
            display: inline-block;
            width: 70px;
            height: 70px;
            line-height: 70px;
            border-radius: 50%;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid #d4af37;
            margin-bottom: 20px;
        }
        .user-icon i {
            font-size: 30px;
            color: #d4af37;
        }

        .official-title {
            display: block;
            font-size: 17px; /* تصغير الخط */
            font-weight: bold;
            margin-bottom: 25px;
            background: linear-gradient(90deg, #d4af37, #fcf6ba, #d4af37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 200% auto;
            animation: shineGold 3s infinite linear;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            color: #fff;
            padding: 14px; /* تصغير حجم الأزرار */
            border-radius: 10px;
            font-weight: bold;
            font-size: 15px; /* تصغير نص الزر */
            transition: 0.3s all;
            border: none;
            position: relative;
            overflow: hidden;
        }

        .btn-insta {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        .btn-tiktok {
            background: #000;
            border: 1px solid #333;
        }

        /* تأثير الضوء اللامع عند الضغط أو التمرير */
        .btn:hover, .btn:active {
            transform: scale(0.97);
            filter: brightness(1.3);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4); /* ضوء لامع */
        }

        .footer {
            font-size: 13px;
            color: #8a7b75;
            margin-top: 30px;
        }

        .gold-shine {
            display: block;
            font-weight: bold;
            font-size: 14px;
            margin-top: 8px;
            background: linear-gradient(90deg, #bf953f, #fcf6ba, #bf953f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 200% auto;
            animation: shineGold 3s infinite linear;
        }

        @keyframes shineGold {
            to { background-position: 200% center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="user-icon">
            <i class="fas fa-user-shield"></i>
        </div>
        
        <span class="official-title">حساباتي الرسمية</span>

        <div class="links">
            <a href="https://www.instagram.com/3s5vj" class="btn btn-insta" target="_blank">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://www.tiktok.com/@3s5vj" class="btn btn-tiktok" target="_blank">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
        </div>

        <div class="footer">
             اضغط للمتابعة
             <span class="gold-shine">✨ وصول مميز ✨</span>
        </div>
    </div>

</body>
</html>
