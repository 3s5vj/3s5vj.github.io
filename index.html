<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3s5vj</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* الخلفية التي طلبتها في الصورة */
            background: linear-gradient(135deg, #1e3aed 0%, #a855f7 100%);
            font-family: sans-serif;
            color: white;
            overflow: hidden;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            width: 85%;
            max-width: 360px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .header-icons {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 30px;
        }

        .header-icons i {
            font-size: 55px;
            color: white;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }

        .subtitle {
            font-size: 18px;
            margin-bottom: 30px;
            display: block;
            color: rgba(255,255,255,0.9);
        }

        .links-area {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            padding: 16px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.4s ease; /* سرعة استجابة الضوء */
            border: none;
            cursor: pointer;
        }

        /* زر انستقرام الأصلي وتوهجه */
        .btn-insta {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        .btn-insta:hover {
            transform: translateY(-3px);
            /* توهج لوني للانستقرام */
            box-shadow: 0 0 25px rgba(220, 39, 67, 0.7);
            filter: brightness(1.2);
        }

        /* زر تيك توك وتوهجه */
        .btn-tiktok {
            background-color: #000;
            border: 1px solid #333;
        }

        .btn-tiktok:hover {
            transform: translateY(-3px);
            /* توهج أبيض/أزرق للتيك توك */
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
            filter: brightness(1.3);
        }

        .btn i { margin-left: 10px; font-size: 22px; }

        .footer {
            font-size: 14px;
            margin-top: 30px;
            color: rgba(255,255,255,0.7);
        }

        /* الذهب اللامع */
        .gold-shine {
            display: block;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
            background: linear-gradient(90deg, #bf953f, #fcf6ba, #b38728, #fcf6ba, #bf953f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 200% auto;
            animation: shine 3s infinite linear;
        }

        @keyframes shine { to { background-position: 200% center; } }
    </style>
</head>
<body>

    <div class="glass-container">
        <div class="header-icons">
            <i class="fab fa-instagram"></i>
            <i class="fab fa-tiktok"></i>
        </div>

        <span class="subtitle">حساباتي الرسمية</span>

        <div class="links-area">
            <a href="https://www.instagram.com/3s5vj" class="btn btn-insta" target="_blank">
                <i class="fab fa-instagram"></i> Instagram
            </a>

            <a href="https://www.tiktok.com/@3s5vj" class="btn btn-tiktok" target="_blank">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
        </div>

        <div class="footer">
            اضغط للمتابعة
            <span class="gold-shine">✨ وصول مميز ✨</span>
        </div>
    </div>

</body>
</html>
