<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حساباتي الرسمية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #0f0a0a; /* لون الخلفية الغامق كما في الصورة */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .container {
            background-color: #1c1616; /* لون البطاقة الداخلي */
            padding: 40px 20px;
            border-radius: 25px;
            text-align: center;
            width: 90%;
            max-width: 340px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid #e95959; /* لون الإطار حول الصورة */
            margin-bottom: 15px;
            object-fit: cover;
        }

        h2 {
            font-size: 20px;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 17px;
            transition: transform 0.2s ease; /* أنيميشن الضغط */
        }

        /* أنيميشن عند الضغط */
        .link-card:active {
            transform: scale(0.92);
        }

        /* ألوان الأزرار كما في الصورة */
        .instagram {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        .tiktok {
            background-color: #000000;
            border: 1px solid #333;
        }

        .discord {
            background-color: #5865F2; /* لون ديسكورد الرسمي */
        }

        .footer-text {
            margin-top: 30px;
            font-size: 12px;
            color: #777;
        }

        .sparkle {
            color: #f09433;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://via.placeholder.com/90" alt="Profile" class="profile-img">
        
        <h2>✨ حساباتي الرسمية ✨</h2>

        <div class="links">
            <a href="https://www.instagram.com/i15.1" class="link-card instagram">
                <i class="fab fa-instagram"></i> Instagram
            </a>

            <a href="https://www.tiktok.com/@i15.1" class="link-card tiktok">
                <i class="fab fa-tiktok"></i> TikTok
            </a>

            <a href="https://discord.com/users/i15.1" class="link-card discord">
                <i class="fab fa-discord"></i> Discord
            </a>
        </div>

        <p class="footer-text">اضغط للمتابعة<br>✨ وصول مميز ✨</p>
    </div>

</body>
</html>
