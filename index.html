<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3s5vj</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e0e0e0;
        }

        .container {
            background: #141414;
            padding: 50px 40px; /* زيادة المساحة العلوية بعد حذف الاسم */
            border-radius: 30px;
            text-align: center;
            width: 85%;
            max-width: 380px;
            border: 1px solid #2a2a2a;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* حاوية الأيقونات بالأعلى */
        .icons-header {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 30px;
        }

        .icons-header i {
            font-size: 50px;
            color: #d4af37; /* ذهبي ملكي */
            transition: 0.4s;
            filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.3));
        }

        .subtitle {
            color: #888;
            margin-bottom: 35px;
            font-size: 18px;
            display: block;
            letter-spacing: 1px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            color: #fff;
            padding: 18px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 18px;
            transition: 0.3s all ease;
            border: none;
        }

        /* ألوان الأزرار الصافية */
        .btn-insta {
            background: #b81d5b; /* عنابي فخم */
        }

        .btn-tiktok {
            background: #2a2a2a; /* أسود كربوني */
            border: 1px solid #333;
        }

        /* تأثير التوهج عند الضغط */
        .btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.2);
        }

        .btn-insta:hover {
            box-shadow: 0 5px 20px rgba(184, 29, 91, 0.4);
        }

        .btn-tiktok:hover {
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.1);
        }

        .footer {
            font-size: 14px;
            color: #555;
            margin-top: 40px;
            display: block;
        }

        .gold-text {
            color: #d4af37;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icons-header">
            <i class="fab fa-instagram"></i>
            <i class="fab fa-tiktok"></i>
        </div>
        
        <span class="subtitle">حساباتي الرسمية</span>

        <div class="links">
            <a href="https://instagram.com/3s5vj" class="btn btn-insta">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://tiktok.com/@3s5vj" class="btn btn-tiktok">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
        </div>

        <div class="footer">
             ✨ <span class="gold-text">وصول مميز</span> ✨
             <br>
             اضغط على أي زر للمتابعة
        </div>
    </div>

</body>
</html>
