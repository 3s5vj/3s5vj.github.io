<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3s5vj</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0d0d0d; /* أسود ملكي عميق */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e0e0e0;
        }

        .container {
            background: #141414; /* خلفية الواجهة أسود مطفي */
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            width: 85%;
            max-width: 380px;
            border: 1px solid #2a2a2a;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* دائرة الحرف الذهبية */
        .profile-icon {
            width: 110px;
            height: 110px;
            background: #1a1a1a;
            border: 2px solid #d4af37; /* ذهبي أصلي */
            border-radius: 50%;
            margin: 0 auto 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            color: #d4af37;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .username {
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #fff;
        }

        .subtitle {
            color: #888;
            margin-bottom: 35px;
            font-size: 17px;
            display: block;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: block;
            text-decoration: none;
            color: #fff;
            padding: 16px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 18px;
            transition: 0.3s;
            border: none;
        }

        /* ألوان كاملة ومتناسقة للأزرار */
        .btn-insta {
            background: #b81d5b; /* لون عنابي فخم متناسق مع الذهبي */
        }

        .btn-tiktok {
            background: #2a2a2a; /* أسود رصاصي غامق */
            border: 1px solid #444;
        }

        .btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.2);
        }

        /* النص السفلي بالعربي */
        .footer {
            font-size: 14px;
            color: #666;
            margin-top: 35px;
            display: block;
        }

        .gold-text {
            color: #d4af37;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-icon">𝓗</div>

        <div class="username">𝓗 𖢱</div>
        
        <span class="subtitle">حساباتي الرسمية</span>

        <div class="links">
            <a href="https://instagram.com/3s5vj" class="btn btn-insta">Instagram</a>
            <a href="https://tiktok.com/@3s5vj" class="btn btn-tiktok">TikTok</a>
        </div>

        <div class="footer">
             ✨ <span class="gold-text">وصول مميز</span> ✨
             <br>
             اضغط على أي زر للمتابعة
        </div>
    </div>

</body>
</html>
