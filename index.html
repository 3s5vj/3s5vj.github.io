<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3s5vj</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a0f0a; /* بني غامق ملكي */
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden;
        }

        .container {
            background: rgba(43, 29, 23, 0.7);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            width: 85%;
            max-width: 340px;
            border: 1px solid rgba(255, 255, 255, 0.05); /* إطار شفاف ناعم جداً */
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .profile-area {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        /* الإطار المعدل بلون ذهبي وردي مطفي */
        .user-circle {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 3px solid #b76e79; /* ذهبي وردي مطفي (Matte Rose Gold) */
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            box-shadow: 0 0 15px rgba(183, 110, 121, 0.2);
        }

        .user-circle i {
            font-size: 45px;
            color: #b76e79; /* أيقونة شخص ذهبية وردية */
        }

        /* العنوان مع النجمات واللمعان الذهبي الأصلية */
        .official-title {
            display: block;
            font-size: 19px;
            font-weight: bold;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #d4af37, #fcf6ba, #d4af37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 200% auto;
            animation: shineGold 3s infinite linear;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
            border: none;
        }

        /* توهج انستقرام عند الضغط */
        .btn-insta {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }
        .btn-insta:hover, .btn-insta:active {
            box-shadow: 0 0 20px rgba(220, 39, 67, 0.8); 
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        /* توهج تيك توك أبيض ناعم عند الضغط */
        .btn-tiktok {
            background: #000;
            border: 1px solid #333;
        }
        .btn-tiktok:hover, .btn-tiktok:active {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        .footer {
            font-size: 13px;
            color: #8a7b75;
            margin-top: 35px;
        }

        .gold-shine {
            display: block;
            font-weight: bold;
            font-size: 15px;
            margin-top: 10px;
            background: linear-gradient(90deg, #bf953f, #fcf6ba, #bf953f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 200% auto;
            animation: shineGold 3s infinite linear;
        }

        @keyframes shineGold {
            to { background-position: 200% center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-area">
            <div class="user-circle">
                <i class="fas fa-user"></i>
            </div>
        </div>

        <span class="official-title">✨ حساباتي الرسمية ✨</span>

        <div class="links">
            <a href="https://www.instagram.com/3s5vj" class="btn btn-insta" target="_blank">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://www.tiktok.com/@3s5vj" class="btn btn-tiktok" target="_blank">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
        </div>

        <div class="footer">
             اضغط للمتابعة
             <span class="gold-shine">✨ وصول مميز ✨</span>
        </div>
    </div>

</body>
</html>
