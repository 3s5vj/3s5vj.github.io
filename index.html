<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3s5vj</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a0f0a; /* بني غامق فخم */
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: white;
        }

        .container {
            background: rgba(43, 29, 23, 0.8);
            backdrop-filter: blur(15px);
            padding: 45px 30px;
            border-radius: 25px;
            text-align: center;
            width: 85%;
            max-width: 340px;
            border: 1px solid rgba(183, 110, 121, 0.2); /* إطار ذهبي وردي خفيف */
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        /* أيقونة الشخص ثابتة وراقية */
        .profile-area {
            margin-bottom: 25px;
        }

        .user-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #b76e79; /* ذهبي وردي */
            display: inline-flex;
            justify-content: center;
            align-items: center;
            color: #b76e79;
            font-size: 35px;
        }

        /* نصوص ثابتة بألوان فخمة بدون حركة لمعان */
        .official-title {
            display: block;
            font-size: 19px;
            font-weight: bold;
            color: #d4af37; /* ذهبي مطفي */
            margin-bottom: 35px;
            letter-spacing: 1px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            color: white;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            border: none;
        }

        /* توهج الأزرار عند اللمس فقط (إحساس تقني احترافي) */
        .btn-insta {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }
        .btn-insta:hover {
            box-shadow: 0 0 20px rgba(220, 39, 67, 0.6);
            transform: translateY(-2px);
        }

        .btn-tiktok {
            background: #000;
            border: 1px solid #333;
        }
        .btn-tiktok:hover {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 40px;
            font-size: 13px;
            color: #8a7b75;
        }

        .gold-feature {
            display: block;
            margin-top: 10px;
            color: #d4af37;
            font-weight: bold;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-area">
            <div class="user-circle">
                <i class="fas fa-user"></i>
            </div>
        </div>

        <span class="official-title">✨ حساباتي الرسمية ✨</span>

        <div class="links">
            <a href="https://www.instagram.com/3s5vj" class="btn btn-insta" target="_blank">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://www.tiktok.com/@3s5vj" class="btn btn-tiktok" target="_blank">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
        </div>

        <div class="footer">
             اضغط للمتابعة
             <span class="gold-feature">✨ وصول مميز ✨</span>
        </div>
    </div>

</body>
</html>
