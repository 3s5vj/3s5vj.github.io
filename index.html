<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3s5vj</title>
    <style>
        body { margin: 0; background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; color: white; }
        .container { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); padding: 40px; border-radius: 30px; text-align: center; width: 85%; max-width: 380px; border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* هذا الجزء هو "المقص" الحقيقي للحواف البيضاء */
        .img-wrapper {
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden; /* يمسح أي شيء خارج الدائرة */
            display: flex;
            justify-content: center;
            align-items: center;
            border: none;
            background: none;
        }
        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* يملأ الدائرة ويقص الحواف الزائدة */
        }

        .username { font-size: 42px; font-weight: bold; margin-bottom: 20px; }
        .btn { display: block; text-decoration: none; color: white; padding: 15px; margin-bottom: 15px; border-radius: 12px; font-weight: bold; }
        .btn-insta { background: linear-gradient(45deg, #f09433, #bc1888); }
        .btn-tiktok { background: #00f2fe; color: #000; }
    </style>
</head>
<body>
    <div class="container">
        <div class="img-wrapper">
            <img src="1000005021.jpg" alt="">
        </div>
        <div class="username">𝓗 𖢱</div>
        <a href="https://instagram.com/3s5vj" class="btn btn-insta">Instagram</a>
        <a href="https://tiktok.com/@3s5vj" class="btn btn-tiktok">TikTok</a>
    </div>
</body>
</html>
