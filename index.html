        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a0f0a; /* بني غامق فخم */
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: white;
            overflow: hidden;
        }

        .container {
            background: rgba(43, 29, 23, 0.7);
            backdrop-filter: blur(15px);
            padding: 40px 30px 15px 30px; /* تصغير المساحة من الأسفل بناءً على طلبك السابق */
            border-radius: 30px;
            text-align: center;
            width: 85%;
            max-width: 340px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .profile-area {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        .user-circle {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 3px solid #b76e79; /* ذهبي وردي مطفي */
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(183, 110, 121, 0.2);
        }

        .user-circle i {
            font-size: 45px;
            color: #b76e79;
        }

        /* حاوية نصوص اللمعان - لتطبيق التوهج */
        .shimmer-wrapper {
            display: inline-block;
            position: relative;
            overflow: hidden;
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textShimmer 4s infinite linear;
            font-weight: bold;
        }

        /* --- عنوان "حساباتي الرسمية" بلون فضي بلاتيني لامع ومستقل --- */
        .official-title {
            display: block;
            margin-bottom: 35px;
            font-size: 19px;
            /* تدرج فضي بلاتيني ساطع */
            background-image: linear-gradient(to right, #a0a0a0 0%, #ffffff 50%, #a0a0a0 100%);
            /* توهج فضي ناعم */
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.2s ease; /* سرعة تفاعل ميكانيكية عند الضغط */
            border: none;
            position: relative;
            overflow: hidden;
        }

        /* تأثير الوميض والضغط (Active Effect) عند الضغط على الزر */
        .btn:active {
            transform: scale(0.97); /* تصغير حجم الزر قليلاً جداً لإعطاء إحساس حقيقي بالضغط */
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: inherit;
            pointer-events: none;
            opacity: 0;
            transition: all 0.2s ease;
        }

        /* لون انستقرام الأصلي المتدرج */
        .btn-insta {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }
        
        .btn-insta:hover {
            box-shadow: 0 0 25px rgba(220, 39, 67, 0.8);
            filter: brightness(1.2);
        }

        /* تأثير الوميض الساطع (Active Flash) عند الضغط لزر انستقرام */
        .btn-insta:active::after {
            background: rgba(220, 39, 67, 0.8); /* وميض أحمر مطابق للون الزر */
            animation: flashNeon 0.3s ease-out;
            opacity: 1;
        }

        .btn-tiktok {
            background: #000;
            border: 1px solid #333;
        }
        
        .btn-tiktok:hover {
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.4);
            filter: brightness(1.2);
        }

        /* تأثير الوميض الساطع (Active Flash) عند الضغط لزر تيك توك */
        .btn-tiktok:active::after {
            background: rgba(255, 255, 255, 0.6); /* وميض أبيض ساطع مطابق للون التيك توك */
            animation: flashNeon 0.3s ease-out;
            opacity: 1;
        }

        /* --- إضافة زر الديسكورد مع الأنيميشن مطابق تماماً بناءً على طلبك --- */
        .btn-discord {
            background: #5865F2; /* لون ديسكورد الرسمي */
        }

        .btn-discord:hover {
            box-shadow: 0 0 25px rgba(88, 101, 242, 0.6);
            filter: brightness(1.2);
        }

        /* تأثير الوميض الساطع (Active Flash) عند الضغط لزر الديسكورد - تم تغيير لون الوميض ليكون بنفسجياً مطابقاً للون الزر بناءً على طلبك */
        .btn-discord:active::after {
            background: rgba(88, 101, 242, 0.7); /* وميض بنفسجي مطابق للون الديسكورد */
            animation: flashNeon 0.3s ease-out;
            opacity: 1;
        }

        @keyframes flashNeon {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.2); opacity: 0; }
        }

        .footer {
            font-size: 13px;
            color: #8a7b75;
