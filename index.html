<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3s5vj</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a0f0a; /* بني غامق ملكي */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .container {
            background: rgba(43, 29, 23, 0.7);
            backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 25px;
            text-align: center;
            width: 85%;
            max-width: 350px;
            border: 1px solid rgba(212, 175, 55, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .icons-header {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* الأيقونات العلوية بألوانها الأصلية */
        .icons-header .fa-instagram { color: #e4405f; font-size: 40px; }
        .icons-header .fa-tiktok { color: #fff; font-size: 40px; }

        /* كلمة ✨ تواجد رسمي ✨ مع لمعان ذهبي */
        .official-title {
            display: block;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #d4af37, #fcf6ba, #d4af37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 200% auto;
            animation: shineGold 3s infinite linear;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            color: #fff;
            padding: 16px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 17px;
            transition: 0.3s;
            border: none;
        }

        /* زر انستقرام باللون الأصلي (تدرج لوني) */
        .btn-insta {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        /* زر تيك توك باللون الأسود الأصلي */
        .btn-tiktok {
            background: #000;
            border: 1px solid #333;
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.2);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .footer {
            font-size: 14px;
            color: #8a7b75;
            margin-top: 35px;
        }

        .gold-shine {
            display: block;
            font-weight: bold;
            font-size: 15px;
            margin-top: 10px;
            background: linear-gradient(90deg, #bf953f, #fcf6ba, #bf953f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 200% auto;
            animation: shineGold 3s infinite linear;
        }

        @keyframes shineGold {
            to { background-position: 200% center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icons-header">
            <i class="fab fa-instagram"></i>
            <i class="fab fa-tiktok"></i>
        </div>
        
        <span class="official-title">✨ تواجد رسمي ✨</span>

        <div class="links">
            <a href="https://www.instagram.com/3s5vj" class="btn btn-insta" target="_blank">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://www.tiktok.com/@3s5vj" class="btn btn-tiktok" target="_blank">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
        </div>

        <div class="footer">
             اضغط للمتابعة
             <span class="gold-shine">✨ وصول مميز ✨</span>
        </div>
    </div>

</body>
</html>
