<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3s5vj</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0d0d0d; /* أسود عميق للفخامة */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e0e0e0;
        }

        .container {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a); /* تدرج أسود رمادي */
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            width: 85%;
            max-width: 380px;
            border: 1px solid #333; /* إطار خفيف جداً */
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* دائرة الحرف بتصميم فخم (أسود وذهبي) */
        .profile-icon {
            width: 110px;
            height: 110px;
            background: linear-gradient(135deg, #1a1a1a 0%, #333 100%);
            border: 2px solid #c5a059; /* إطار ذهبي مطفي */
            border-radius: 50%;
            margin: 0 auto 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 55px;
            color: #c5a059; /* لون الحرف ذهبي */
            text-shadow: 0 0 10px rgba(197, 160, 89, 0.3);
        }

        .username {
            font-size: 38px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #fff;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #888;
            margin-bottom: 35px;
            font-size: 16px;
            display: block;
            text-transform: uppercase;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: block;
            text-decoration: none;
            color: #fff;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 17px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* أزرار بألوان داكنة ورزنة */
        .btn-insta {
            background: #262626; /* أسود كربوني */
            border-left: 4px solid #c5a059; /* لمسة ذهبية */
        }

        .btn-tiktok {
            background: #262626;
            border-left: 4px solid #fff; /* لمسة بيضاء */
        }

        .btn:hover {
            background: #333;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .footer {
            font-size: 13px;
            color: #555;
            margin-top: 35px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-icon">𝓗</div>

        <div class="username">𝓗 𖢱</div>
        
        <span class="subtitle">حساباتي الرسمية</span>

        <div class="links">
            <a href="https://instagram.com/3s5vj" class="btn btn-insta">Instagram</a>
            <a href="https://tiktok.com/@3s5vj" class="btn btn-tiktok">TikTok</a>
        </div>

        <div class="footer">
            PREMIUM ACCESS ✨
        </div>
    </div>

</body>
</html>
